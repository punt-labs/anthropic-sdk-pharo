name: Slow Suite

# Runs the Messaging SDK full test suite (including tests-integration protocol)
# against the real Anthropic API. Integration failures are visible but do NOT
# block merge (continue-on-error: true). Branch protection does not require
# this check.
#
# Triggers:
#   - schedule:         nightly at 09:17 UTC
#   - pull_request:     label-gated via 'run-live-tests' label
#   - workflow_dispatch: manual run from the Actions tab
#
# ANTHROPIC_API_KEY secret: must be configured in repo Settings > Secrets and
# variables > Actions before this workflow can run. When the secret is absent
# (fork PR, unconfigured repo) the job skips gracefully.

on:
  schedule:
    - cron: '17 9 * * *'
  pull_request:
    types: [opened, reopened, synchronize, labeled]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: slow-suite-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  slow-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'run-live-tests')
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Guard — skip when API key is absent
        id: guard
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY is not available in this context."
            echo "Expected for fork PRs — pwn-request mitigation by design."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "ANTHROPIC_API_KEY is present. Proceeding with live-API test run."
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image + load SDK packages
        if: steps.guard.outputs.has_key == 'true'
        run: make setup

      - name: Run full test suite (ClaudeMessagingTestSuite fullSuite)
        if: steps.guard.outputs.has_key == 'true'
        shell: bash
        run: |
          set -o pipefail
          # The eval script runs each test individually and captures the
          # exception object for any failure or error before SUnit's standard
          # runCase: handler discards it. Per-test detail lines are emitted
          # first (FAIL/ERROR/SKIP one per line, with up to 3 stack frames
          # for errors), then the aggregate summary as the LAST line so log
          # scanners can find it at the tail.
          ./pharo/pharo --headless ./pharo/Pharo.image eval "
            | suite result details out summary passed |
            suite := ClaudeMessagingTestSuite fullSuite.
            result := TestResult new.
            details := OrderedCollection new.
            suite tests do: [ :test |
              [
                test announce: TestCaseStarted withResult: result.
                test runCaseManaged.
                test announce: TestCaseEnded withResult: result.
                result addPass: test
              ] on: TestResult failure , TestResult skip , TestResult warning , TestResult error
                do: [ :ex |
                  | label kind msg frames ctx limit |
                  (ex isKindOf: TestResult warning)
                    ifTrue: [
                      ex sunitAnnounce: test toResult: result ]
                    ifFalse: [
                      label := test class name , '>>' , test selector.
                      kind := (ex isKindOf: TestResult failure)
                        ifTrue: [ 'FAIL' ]
                        ifFalse: [ (ex isKindOf: TestResult skip)
                          ifTrue: [ 'SKIP' ]
                          ifFalse: [ 'ERROR' ] ].
                      msg := ex messageText.
                      (msg isNil or: [ msg isEmpty ]) ifTrue: [ msg := ex description ].
                      msg := msg copyReplaceAll: String cr with: ' '.
                      msg := msg copyReplaceAll: String lf with: ' '.
                      frames := OrderedCollection new.
                      kind = 'ERROR' ifTrue: [
                        ctx := ex signalerContext.
                        limit := 3.
                        [ ctx notNil and: [ limit > 0 ] ] whileTrue: [
                          frames add: ctx printString.
                          ctx := ctx sender.
                          limit := limit - 1 ] ].
                      details add: { kind. label. ex class name. msg. frames }.
                      ex sunitAnnounce: test toResult: result ] ] ].
            out := Stdio stdout.
            details do: [ :d |
              | kind label exClass msg frames line |
              kind := d at: 1.
              label := d at: 2.
              exClass := d at: 3.
              msg := d at: 4.
              frames := d at: 5.
              kind = 'FAIL' ifTrue: [
                line := 'FAIL ' , label , ' : ' , msg.
                out nextPutAll: line; lf ].
              kind = 'ERROR' ifTrue: [
                line := 'ERROR ' , label , ' : ' , exClass , ' -- ' , msg.
                out nextPutAll: line; lf.
                frames do: [ :f |
                  out nextPutAll: '  at ' , f; lf ] ].
              kind = 'SKIP' ifTrue: [
                line := 'SKIP ' , label , ' : ' , msg.
                out nextPutAll: line; lf ] ].
            out flush.
            summary := 'MessagingSlowSuiteResult Tests: ', result runCount printString,
              ' Passed: ', result passedCount printString,
              ' Failures: ', result failureCount printString,
              ' Errors: ', result errorCount printString.
            out nextPutAll: summary; lf; flush.
            passed := result failureCount = 0 and: [ result errorCount = 0 ].
            passed ifTrue: [ Smalltalk exitSuccess ] ifFalse: [ Smalltalk exitFailure ]
          " 2>&1 | tee slow-suite.log
          pharo_rc=${PIPESTATUS[0]}
          if [ "${pharo_rc}" -ne 0 ]; then
            echo "slow suite: pharo exited non-zero"
            exit 1
          fi
          if ! grep -q 'MessagingSlowSuiteResult' slow-suite.log; then
            echo "slow suite: no summary line — Pharo likely crashed"
            exit 1
          fi
          if ! grep -q 'Failures: 0' slow-suite.log; then
            echo "slow suite: failures present"
            exit 1
          fi
          if ! grep -q 'Errors: 0' slow-suite.log; then
            echo "slow suite: errors present"
            exit 1
          fi
          echo "slow suite: 0 failures, 0 errors"

      - name: Report skip
        if: steps.guard.outputs.has_key != 'true'
        run: |
          echo "Slow suite skipped: ANTHROPIC_API_KEY not available."
